<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hhj's oj</title>
    <style>
        /* 全局重置与基础 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(145deg, #f8f9fc 0%, #e9edf4 100%);
            font-family: "微软雅黑", "Microsoft YaHei", sans-serif;
            padding: 1.5rem;
            text-align: center;
        }
    
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(6px);
            padding: 3rem 4rem;
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.15),
                        0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            text-align: center;
            max-width: 500px;
            width: 100%;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            display: inline-block;
            margin-bottom: 30px;
        }
    
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 60px -16px rgba(0, 0, 0, 0.2);
        }
    
        .gg {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(6px);
            padding: 2rem 5rem;
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.15),
                        0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            text-align: center;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px auto;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
        }
    
        .gg:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 60px -16px rgba(0, 0, 0, 0.2);
        }
    
        .main-text {
            font-family: "微软雅黑", "Microsoft YaHei", sans-serif;
            font-size: 3.2rem;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 4px;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #1e293b 0%, #475569 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            user-select: none;
        }
    
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #94a3b8, #cbd5e1);
            border-radius: 10px;
            margin: 0 auto 1.8rem auto;
        }
    
        .btn-link {
            display: inline-block;
            padding: 0.7rem 2.2rem;
            font-family: "微软雅黑", "Microsoft YaHei", sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            background: #3b82f6;
            text-decoration: none;
            border-radius: 60px;
            box-shadow: 0 8px 18px -6px rgba(59, 130, 246, 0.4);
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }
    
        .btn-link:hover {
            background: #2563eb;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 14px 28px -8px rgba(59, 130, 246, 0.5);
        }
    
        .btn-link:active {
            transform: scale(0.96);
        }
    
        .btn-link::after {
            content: " →";
            transition: transform 0.2s ease;
            display: inline-block;
        }
    
        .btn-link:hover::after {
            transform: translateX(4px);
        }
    
        /* 退出登录按钮样式（红色） */
        .btn-logout {
            background: #ef4444;
            box-shadow: 0 8px 18px -6px rgba(239, 68, 68, 0.4);
        }
    
        .btn-logout:hover {
            background: #dc2626;
            box-shadow: 0 14px 28px -8px rgba(239, 68, 68, 0.5);
        }
    
        /* 隐藏类 */
        .hidden {
            display: none !important;
        }
    
        @media (max-width: 480px) {
            .card {
                padding: 2rem 1.5rem;
            }
            .gg {
                padding: 1.5rem 2rem;
            }
            .main-text {
                font-size: 2.6rem;
            }
            .btn-link {
                font-size: 1rem;
                padding: 0.6rem 1.8rem;
            }
        }
    </style>
</head>
<body>
    <h1>欢迎来到HHJ-OJ</h1>
    <p id="userInfo"></p>
    
    <!-- 登录按钮（默认显示） -->
    <a href="login.html" target="_blank" class="btn-link" id="loginBtn">登录</a>
    
    <!-- 退出登录按钮（默认隐藏） -->
    <a href="#" class="btn-link btn-logout hidden" id="logoutBtn" onclick="logout()">退出登录</a>
    
    <div class="gg">
        <div class="main-text">公告</div>
        <div class="divider"></div>
        <a href="gg/index.html" target="_blank" class="btn-link">公告1</a>
        <a href="gg/index.html" target="_blank" class="btn-link">公告2</a>
    </div>
    
    <div style="clear:both"></div>
    <h1>
        <p>
            <br>
            分类
            <br>
        </p>
    </h1>
    
    <div class="card">
        <div class="main-text">GESP</div>
        <div class="divider"></div>
        <a href="GESP.html" target="_blank" class="btn-link">前往</a>
    </div>

    <div class="card">
        <div class="main-text">编程题</div>
        <div class="divider"></div>
        <a href="coding.html" target="_blank" class="btn-link">前往</a>
    </div>
    <p>
        <br>
        <br>
        <br>
        <a href="https://github.com/HVGLER/Self-made-oj">支持我们</a>
    </p>

    <script>
        // 获取URL参数
        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                username: params.get('username'),
                password: params.get('password')
            };
        }

        const user = getQueryParams();
        const userInfoEl = document.getElementById('userInfo');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        
        // 检查是否已登录
        if (userInfoEl) {
            if (user.username) {
                // ✅ 已登录：显示用户名，隐藏登录按钮，显示退出按钮
                userInfoEl.textContent = '👤 当前用户：' + user.username;
                loginBtn.classList.add('hidden');  // 隐藏登录按钮
                logoutBtn.classList.remove('hidden'); // 显示退出按钮
            } else {
                // ❌ 未登录：显示未登录，显示登录按钮，隐藏退出按钮
                userInfoEl.textContent = '🔓 未登录';
                loginBtn.classList.remove('hidden'); // 显示登录按钮
                logoutBtn.classList.add('hidden'); // 隐藏退出按钮
            }
        }

        // 退出登录函数
        function logout() {
            // 清除URL参数，跳转到首页
            window.location.href = 'index.html';
            // 或者可以清除 localStorage/sessionStorage 等
        }
    </script>
</body>
</html>
